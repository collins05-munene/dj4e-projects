{% extends 'apps/base.html' %}

{% block title %} Update Page {% endblock %}

{% block content %}
    <h1>Update, {{student.name}}</h1>
    <form method="POST">
        {% csrf_token %}
        <label>Name: </label>
        <input type="text" value="{{student.name}}" name="name">

        <label>Grade: </label>
        <select name="grade">
            {% for grade in grades %}
            <option value="{{grade.id}}" {% if student.grade.id == grade.id %}selected{% endif %}>{{grade.name}}</option>
            {% endfor %}
        </select>

        {% for subject in subjects %}
        <label>
            <input type="checkbox" name="subjects" value="{{subject.id}}" {% if subject in student.subjects.all %} checked {% endif %}>{{subject.name}}
        </label>
        {% endfor %}
        <button type="submit">Update, {{student.name}}</button>
    </form>
{% endblock %}
