{% extends 'apps/base.html' %}

{% block title %} <title>Delete Item Page</title>
<style>.delete-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.delete-card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.warning {
    margin: 15px 0;
    font-size: 16px;
}

.subtext {
    color: gray;
    font-size: 14px;
    margin-bottom: 20px;
}

/* Delete button */
.delete-btn {
    background: red;
    color: white;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.delete-btn:hover {
    background: darkred;
}

/* Cancel link */
.cancel-link {
    display: inline-block;
    margin-top: 15px;
    color: #2a5298;
    text-decoration: none;
}

.cancel-link:hover {
    text-decoration: underline;
}</style>
{% endblock %}

{% block content %}
    <div class="delete-container">

    <div class="delete-card">
        <h1>Delete Item</h1>

        <p class="warning">
            Are you sure you want to delete 
            <strong>{{ item.name }}</strong>?
        </p>

        <p class="subtext">This action cannot be undone.</p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn delete-btn">Yes, Delete</button>
        </form>

        <a href="{% url 'admin-page' %}" class="cancel-link">Cancel</a>
    </div>

</div>
{% endblock %}
