{% extends 'apps/base.html' %}

{% block title %}
    <title>Delete Account</title>
{% endblock %}

{% block content %}
    <h1>Delete Account</h1>
    <form method="POST">
        {% csrf_token %}
        <p>Are you sure you want to delete, {{object.username}}</p>
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'homepage' %}">Cancel</a>
    </form>
{% endblock %}
