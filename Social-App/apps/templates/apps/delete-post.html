{% extends 'apps/base.html' %}

{% block title %}
    <title>Delete Post</title>
{% endblock %}

{% block content %}
    <h1>Delete Post</h1>
    <p>Are you sure you want to delete,<b> "{{post.title}}"?</b></p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>
    <a href="{% url 'client-page' %}">Cancel</a>
{% endblock %}
