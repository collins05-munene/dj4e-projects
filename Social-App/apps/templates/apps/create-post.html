{% extends 'apps/base.html' %}

{% block title %}
    <title>Create Post</title>
{% endblock %}

{% block content %}
    <h1>Create Post</h1>
    <form method="POST">
        {% csrf_token %}
        <p>
            {{form.title.label_tag}}
            {{form.title}}
        </p>
        <p>
            {{form.content.label_tag}}
            {{form.content}}
        </p>
        <button type="submit">Create Post</button>
    </form>
{% endblock %}
